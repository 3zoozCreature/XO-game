<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <script defer src="app.js"></script>
  <title>Tic-Tac-Toe</title>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <h2 id="message">Message</h2>

  <section class="board">
        <!-- I do not know what data index is but google says it's the only way
         to keep the string ids while not affecting the number id in squareIndex -->

    <div class="sqr" id="zero" data-index="0"></div>
    <div class="sqr" id="one" data-index="1"></div>
    <div class="sqr" id="two" data-index="2"></div>
    <div class="sqr" id="three" data-index="3"></div>
    <div class="sqr" id="four" data-index="4"></div>
    <div class="sqr" id="five" data-index="5"></div>
    <div class="sqr" id="six" data-index="6"></div>
    <div class="sqr" id="seven" data-index="7"></div>
    <div class="sqr" id="eight" data-index="8"></div>
  </section>
  <button id="reset">Reset</button>
</body>
</html>
