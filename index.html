<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.css">
  <script defer src="app.js"></script>
  <title>Tic-Tac-Toe</title>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <h2 id="message">Message</h2>

  <section class="board">
    <div class="sqr" id="zero"></div>
    <div class="sqr" id="one"></div>
    <div class="sqr" id="two"></div>
    <div class="sqr" id="three"></div>
    <div class="sqr" id="four"></div>
    <div class="sqr" id="five"></div>
    <div class="sqr" id="six"></div>
    <div class="sqr" id="seven"></div>
    <div class="sqr" id="eight"></div>
  </section>
</body>
</html>
